name: PolyPulse Updater

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'data/**'
      - '.github/workflows/update.yml'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polypulse-updater
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Whale Scanner
        run: python backend/main.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'PolyPulse Bot'
          git config --global user.email 'bot@polypulse.xyz'
          git add data/whales.json
          if git diff --cached --quiet; then
            echo "No whale data changes to commit."
          else
            git commit -m "🐳 Update whale data"
            git push
          fi
